<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition — Numbers MCQ × 67</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:wght@400;600&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --gold: #d4a017;
    --red: #c0392b;
    --amber: #e67e22;
    --bg: #faf8f3;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e0d5;
    --correct: #d1fae5;
    --incorrect: #fee2e2;
    --correct-border: #34d399;
    --incorrect-border: #f87171;
    --opt-bg: #f7f4ef;
    --score-bg: #ffffff;
    --section-bg: #2d6a4f;
    --exp-bg: #f0faf5;
    --exp-text: #2d6a4f;
  }
  [data-theme="dark"] {
    --bg: #141414;
    --card: #1e1e1e;
    --text: #f0f0f0;
    --muted: #a0a0a0;
    --border: #2e2e2e;
    --correct: #0e2a1a;
    --incorrect: #2a0e0e;
    --correct-border: #22a060;
    --incorrect-border: #cc4444;
    --opt-bg: #252525;
    --score-bg: #1a1a1a;
    --section-bg: #1e3a2a;
    --exp-bg: #162210;
    --exp-text: #6dce9e;
  }

  /* Dark mode polish */
  [data-theme="dark"] .q-card {
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  [data-theme="dark"] .q-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  [data-theme="dark"] .opt-btn:hover:not(:disabled) {
    border-color: var(--green-light);
    background: #1c2e20;
  }
  [data-theme="dark"] .opt-btn .opt-letter {
    background: #333;
    color: #ddd;
  }
  [data-theme="dark"] .opt-btn.correct .opt-letter {
    background: #22a060;
    color: #fff;
  }
  [data-theme="dark"] .opt-btn.incorrect .opt-letter {
    background: #cc4444;
    color: #fff;
  }
  [data-theme="dark"] .score-bar {
    border-bottom-color: #2e2e2e;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  [data-theme="dark"] .progress-track {
    background: #2e2e2e;
  }
  [data-theme="dark"] .header {
    background: #1a3a28;
  }
  [data-theme="dark"] .q-num {
    background: #2d6a4f;
    opacity: 0.9;
  }
  [data-theme="dark"] .explanation {
    border-left-color: var(--green-light);
  }
  [data-theme="dark"] .result-banner {
    background: #1a3a28;
    border: 1.5px solid #2d6a4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  .header {
    background: var(--green);
    color: #fff;
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.03) 10px, rgba(255,255,255,0.03) 20px);
  }
  .header-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .dark-toggle {
    position: absolute;
    top: 0; right: 0;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .dark-toggle:hover { background: rgba(255,255,255,0.25); }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 900;
    line-height: 1.1;
    position: relative;
  }
  .header h1 span {
    color: var(--gold);
  }
  .header-sub {
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    opacity: 0.8;
    margin-top: 8px;
    position: relative;
  }

  .header-controls {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
    z-index: 1000;
  }
  .mode-switcher {
    display: flex;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    padding: 4px;
    border-radius: 30px;
    border: 1.5px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .mode-btn {
    padding: 6px 16px;
    border-radius: 25px;
    border: none;
    background: transparent;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: var(--gold);
    color: #1a1a1a;
    box-shadow: 0 2px 8px rgba(212,160,23,0.4);
  }
  .dark-toggle {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  
  @media (max-width: 600px) {
    .header-controls {
      position: relative;
      top: 0; right: 0;
      align-items: center;
      padding-bottom: 10px;
    }
  }

  /* SCORE BAR */
  .score-bar {
    background: var(--score-bg);
    border-bottom: 2px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    transition: background 0.3s, border-color 0.3s;
  }
  .score-stat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .score-stat .num {
    font-size: 22px;
    font-weight: 600;
  }
  .score-stat .lbl { color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .score-stat.correct .num { color: var(--green); }
  .score-stat.wrong .num { color: var(--red); }
  .score-stat.remain .num { color: var(--amber); }
  .progress-wrap { flex: 1; min-width: 120px; }
  .progress-track {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-light));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }

  /* SECTION HEADERS */
  .section-header {
    background: var(--section-bg);
    color: #fff;
    padding: 10px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.3s;
  }
  .section-header .count {
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 10px;
  }

  /* QUESTIONS */
  .questions {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .q-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s, background 0.3s, border-color 0.3s;
  }
  .q-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

  .q-head {
    padding: 16px 20px 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    background: var(--green);
    border-radius: 6px;
    padding: 3px 8px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: 15px;
    line-height: 1.6;
    font-weight: 600;
    color: var(--text);
  }

  .q-options {
    padding: 0 16px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--opt-bg);
    cursor: pointer;
    text-align: left;
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    color: var(--text);
    transition: all 0.15s;
    width: 100%;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--green);
    background: var(--exp-bg);
  }
  .opt-btn .opt-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    background: var(--border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  /* States */
  .opt-btn.correct {
    background: var(--correct);
    border-color: var(--correct-border);
  }
  .opt-btn.correct .opt-letter {
    background: var(--green);
    color: #fff;
  }
  .opt-btn.incorrect {
    background: var(--incorrect);
    border-color: var(--incorrect-border);
  }
  .opt-btn.incorrect .opt-letter {
    background: var(--red);
    color: #fff;
  }
  .opt-btn.reveal-correct {
    background: var(--correct);
    border-color: var(--correct-border);
    opacity: 0.6;
  }
  .opt-btn:disabled { cursor: default; }

  /* Explanation */
  .explanation {
    margin: 0 16px 16px;
    padding: 10px 14px;
    background: var(--exp-bg);
    border-left: 3px solid var(--green);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--exp-text);
    display: none;
    font-family: 'Cairo', sans-serif;
    line-height: 1.6;
    transition: background 0.3s, color 0.3s;
  }
  .explanation.show { display: block; }

  /* Result banner */
  .result-banner {
    display: none;
    max-width: 860px;
    margin: 20px auto;
    background: var(--green);
    color: #fff;
    border-radius: 12px;
    padding: 32px 24px;
    text-align: center;
  }
  .result-banner.show { display: block; }
  .result-banner .big-score {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 900;
    color: var(--gold);
  }
  .result-banner .grade {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    margin-top: 8px;
  }
  .result-banner p {
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    opacity: 0.85;
    margin-top: 12px;
  }
  .retry-btn {
    margin-top: 20px;
    padding: 12px 32px;
    background: var(--gold);
    color: #1a1a1a;
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-controls">
    <button class="dark-toggle" onclick="toggleDark()" id="dark-btn">
      <span id="dark-icon">☀️</span> <span id="dark-label">LIGHT</span>
    </button>
    <div class="mode-switcher">
      <button class="mode-btn active" onclick="setMode('sections')" id="btn-sections">
        🗂️ SECTIONS
      </button>
      <button class="mode-btn" onclick="setMode('shuffle')" id="btn-shuffle">
        🔀 SHUFFLE
      </button>
    </div>
  </div>
  <div class="header-label">صل على النبي ﷺ</div>
  <h1>Nutrition — <span>180 Questions</span></h1>
  <div class="header-sub">متنساش تدعيلي و صل على النبي ﷺ — Made by Omar Mahmoud</div>
</div>

<div class="score-bar">
  <div class="score-stat correct"><span class="num" id="s-correct">0</span><span class="lbl">Correct</span></div>
  <div class="score-stat wrong"><span class="num" id="s-wrong">0</span><span class="lbl">Wrong</span></div>
  <div class="score-stat remain"><span class="num" id="s-remain">67</span><span class="lbl">Left</span></div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="progress-label" id="prog-label">0 / 67</div>
  </div>
</div>

<div class="questions" id="q-container"></div>
<div class="result-banner" id="result-banner">
  <div class="big-score" id="final-score"></div>
  <div class="grade" id="final-grade"></div>
  <p id="final-msg"></p>
  <button class="retry-btn" onclick="location.reload()">↻ RETRY</button>
</div>

<script>

const originalQuestions = [
  {
    section: "L1 — Nutrients",
    q: "How many kcal does 1 gram of fat provide?",
    opts: ["4 kcal","7 kcal","9 kcal","11 kcal"],
    ans: 2,
    exp: "Fat = 9 kcal/g · Carbs & Protein = 4 kcal/g · Water/Vitamins/Minerals = 0 kcal/g"
  },
  {
    section: "L1 — Nutrients",
    q: "What is the approximate daily calorie budget used in the 'Body Budget' analogy?",
    opts: ["1500 kcal","2000 kcal","2500 kcal","3000 kcal"],
    ans: 1,
    exp: "~2,000 kcal/day — fill with nutrients first, leftover = 'fun calories'"
  },
  {
    section: "L1 — Nutrients",
    q: "How many classes of nutrients exist?",
    opts: ["4","5","6","7"],
    ans: 2,
    exp: "6 classes: Carbohydrates, Proteins, Fats (macros) + Vitamins, Minerals, Water (micros)"
  },
  {
    section: "L2 — Macronutrients",
    q: "What percentage of daily calories should come from Carbohydrates?",
    opts: ["20–35%","45–65%","10–35%","55–75%"],
    ans: 1,
    exp: "Carbohydrates = 45–65% of daily calories (primary energy source)"
  },
  {
    section: "L2 — Macronutrients",
    q: "What percentage of daily calories should come from Protein?",
    opts: ["5–15%","10–35%","20–40%","35–50%"],
    ans: 1,
    exp: "Protein = 10–35% of daily calories — builds, repairs and maintains body tissues"
  },
  {
    section: "L2 — Macronutrients",
    q: "What percentage of daily calories should come from Fats?",
    opts: ["10–20%","15–25%","20–35%","30–45%"],
    ans: 2,
    exp: "Fats = 20–35% of daily calories — energy, cell membranes, hormone synthesis"
  },
  {
    section: "L2 — Macronutrients",
    q: "Out of 20 total amino acids, how many are ESSENTIAL (must come from food)?",
    opts: ["5","7","9","11"],
    ans: 2,
    exp: "9 essential amino acids must come from food; the body makes the other 11 (non-essential)"
  },
  {
    section: "L2 — Macronutrients",
    q: "How many amino acids does the body manufacture itself (non-essential)?",
    opts: ["7","9","11","13"],
    ans: 2,
    exp: "Body makes 11 non-essential amino acids; 9 are essential and must come from food"
  },
  {
    section: "L2 — Macronutrients",
    q: "How many kcal does 1 gram of carbohydrate provide?",
    opts: ["2 kcal","4 kcal","7 kcal","9 kcal"],
    ans: 1,
    exp: "Carbohydrates & Protein = 4 kcal/g; Fat = 9 kcal/g"
  },
  {
    section: "L3 — Food Labelling",
    q: "How many mandatory items must UK food labels include by law?",
    opts: ["7","8","10","12"],
    ans: 2,
    exp: "10 mandatory items: name, mass, dates, storage, preparation, producer, origin, ingredients, allergens, nutritional info"
  },
  {
    section: "L3 — Food Labelling",
    q: "How many common allergens must be highlighted in bold on UK food labels?",
    opts: ["10","12","14","16"],
    ans: 2,
    exp: "14 allergens must be clearly highlighted — e.g. cereals, milk, eggs, peanuts, fish, soya, sesame, sulphites"
  },
  {
    section: "L3 — Food Labelling",
    q: "In the Traffic Light System, how many nutrients are measured?",
    opts: ["2","3","4","5"],
    ans: 2,
    exp: "4 nutrients: Fat, Saturated Fat, Sugars, Salt"
  },
  {
    section: "L3 — Food Labelling",
    q: "Sugar ≥ ___ per 100g = RED on the traffic light system?",
    opts: ["5g","15g","22.5g","30g"],
    ans: 2,
    exp: "Sugar >22.5g per 100g = RED (HIGH). Sugar ≤5g = GREEN"
  },
  {
    section: "L3 — Food Labelling",
    q: "Sugar ≤ ___ per 100g = GREEN on the traffic light system?",
    opts: ["3g","5g","7g","10g"],
    ans: 1,
    exp: "Sugar ≤5g per 100g = GREEN (LOW). >22.5g = RED"
  },
  {
    section: "L3 — Food Labelling",
    q: "Fat > ___ per 100g = RED on the traffic light system?",
    opts: ["10g","15g","17.5g","20g"],
    ans: 2,
    exp: "Fat >17.5g per 100g = RED. Fat ≤3g = GREEN"
  },
  {
    section: "L3 — Food Labelling",
    q: "Salt > ___ per 100g = RED on the traffic light system?",
    opts: ["0.3g","1.0g","1.5g","2.0g"],
    ans: 2,
    exp: "Salt >1.5g per 100g = RED. Salt ≤0.3g = GREEN"
  },
  {
    section: "L3 — Food Labelling",
    q: "What is the daily Reference Intake (RI) for energy for an average adult woman?",
    opts: ["1500 kcal","1800 kcal","2000 kcal","2500 kcal"],
    ans: 2,
    exp: "2000 kcal daily RI for an average adult woman (8400 kJ)"
  },
  {
    section: "L3 — Food Labelling",
    q: "What is the maximum daily Reference Intake for salt for an adult?",
    opts: ["2g","4g","6g","8g"],
    ans: 2,
    exp: "6g salt per day = maximum RI. High salt → hypertension → heart disease & stroke"
  },
  {
    section: "L3 — Food Labelling",
    q: "The daily RI for saturated fat for an adult woman is:",
    opts: ["10g","15g","20g","25g"],
    ans: 2,
    exp: "20g = max daily saturated fat for an adult woman. Saturated fat raises LDL cholesterol"
  },
  {
    section: "L4 — Weight Management",
    q: "According to WHO, how many adults globally are overweight (aged 18+)?",
    opts: ["650 million","1.2 billion","1.9 billion","2.5 billion"],
    ans: 2,
    exp: "1.9 billion overweight adults globally; 650 million are clinically obese — 39% of global adults"
  },
  {
    section: "L4 — Weight Management",
    q: "What waist circumference in MEN signals high metabolic risk?",
    opts: [">30 inches",">35 inches",">40 inches",">45 inches"],
    ans: 2,
    exp: ">40 inches in men, >35 inches in women = high abdominal fat / cardiovascular risk"
  },
  {
    section: "L4 — Weight Management",
    q: "What is the BMI threshold for OBESITY?",
    opts: ["≥25","≥27.5","≥30","≥35"],
    ans: 2,
    exp: "BMI ≥30 = Obesity; 25–29.9 = Overweight; 18.5–24.9 = Normal; <18.5 = Underweight"
  },
  {
    section: "L4 — Weight Management",
    q: "Addressing mental health improves weight management success rates by:",
    opts: ["10–20%","20–30%","40–60%","70–80%"],
    ans: 2,
    exp: "40–60% improvement in success when mental health is addressed alongside physical interventions"
  },
  {
    section: "L4 — Weight Management",
    q: "What percentage of people regain their lost weight within 5 years without ongoing support?",
    opts: ["50%","60%","70%","80%"],
    ans: 3,
    exp: "80% regain weight within 5 years — maintenance requires permanent lifestyle change, not temporary dieting"
  },
  {
    section: "L4 — Weight Management",
    q: "The optimal goal for body weight loss is ___ over 6–12 months?",
    opts: ["1–2%","5–10%","15–20%","25–30%"],
    ans: 1,
    exp: "5–10% of body weight over 6–12 months = optimal, sustainable goal with lasting metabolic benefits"
  },
  {
    section: "L4 — Weight Management",
    q: "Daily caloric deficit for safe fat loss of 1–2 lbs/week is:",
    opts: ["100–200 kcal","300–500 kcal","500–750 kcal","800–1000 kcal"],
    ans: 2,
    exp: "500–750 kcal deficit/day → 1–2 lbs/week safe fat loss. Also cited as 300–500 kcal in some sources"
  },
  {
    section: "L4 — Weight Management",
    q: "Behavioral interventions can ___ weight loss outcomes vs dietary advice alone:",
    opts: ["Increase by 20%","Double (2×)","Triple (3×)","Increase by 50%"],
    ans: 1,
    exp: "Behavioral support doubles weight loss results compared to diet advice alone"
  },
  {
    section: "L5 — DCI / BMR / TDEE",
    q: "In the Mifflin-St Jeor equation for MEN, what constant is added at the end?",
    opts: ["+5","+161","-5","-161"],
    ans: 0,
    exp: "Men: BMR = (10×kg) + (6.25×cm) − (5×age) + 5. Women subtract 161 instead"
  },

    "opts": ["By chemically analyzing the sugar content in a laboratory", "By measuring the blood glucose response over two hours after eating and comparing it to pure glucose", "By calculating the ratio of simple to complex carbohydrates", "By measuring insulin secretion after consumption"],
    "ans": 1,
    "exp": "By measuring the blood glucose response over two hours after eating and comparing it to pure glucose"
  },
  {
    "section": "Glycemic Index",
    "q": "Why do whole grain cereals have a lower GI than refined carbohydrates?",
    "opts": ["Whole grains contain less starch overall", "Whole grains contain fiber and resistant starch that slow digestion and absorption", "Refined carbohydrates contain more fat", "Whole grains are absorbed in the large intestine"],
    "ans": 1,
    "exp": "Whole grains contain fiber and resistant starch that slow digestion and absorption"
  },
  {
    "section": "Glycemic Index",
    "q": "Why is a low GI diet beneficial for people with type 2 diabetes?",
    "opts": ["It eliminates all carbohydrates preventing any glucose rise", "Low GI foods cause smaller and slower blood glucose fluctuations reducing insulin demand", "Low GI foods contain no sugar whatsoever", "It automatically reduces calorie intake"],
    "ans": 1,
    "exp": "Low GI foods cause smaller and slower blood glucose fluctuations reducing insulin demand"
  },
  {
    "section": "Glycemic Index",
    "q": "Which of the following factors affects the GI of a food?",
    "opts": ["The color and texture of the food", "The type of carbohydrate, fat content, protein content, and rate of digestion", "The country of origin of the food", "The temperature at which the food is served only"],
    "ans": 1,
    "exp": "The type of carbohydrate, fat content, protein content, and rate of digestion"
  },
  {
    "section": "Glycemic Index",
    "q": "Why do high GI foods increase the risk of obesity and type 2 diabetes over time?",
    "opts": ["They cause repeated sharp spikes in blood glucose and insulin leading to insulin resistance and excess fat storage", "They damage the pancreas directly after one meal", "They reduce physical activity levels"],
    "ans": 0,
    "exp": "They cause repeated sharp spikes in blood glucose and insulin leading to insulin resistance and excess fat storage"
  }
];

let questions = [...originalQuestions, ...newQuestions];
let currentQuestions = [...questions];
let correct = 0, wrong = 0, answered = 0;
let isShuffled = false;

function toggleDark() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('dark-icon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('dark-label').textContent = isDark ? 'DARK' : 'LIGHT';
}

function setMode(mode) {
  isShuffled = (mode === 'shuffle');
  
  // Update button classes
  document.getElementById('btn-sections').classList.toggle('active', !isShuffled);
  document.getElementById('btn-shuffle').classList.toggle('active', isShuffled);
  
  // Reset quiz progress
  correct = 0; wrong = 0; answered = 0;
  
  if (isShuffled) {
    // Generate a fresh random order every time shuffle is pressed
    currentQuestions = [...questions].sort(() => Math.random() - 0.5);
  } else {
    currentQuestions = [...questions];
  }
  
  buildQuiz();
  updateStats();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateStats() {
  const total = currentQuestions.length;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-remain').textContent = total - answered;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = answered + ' / ' + total;
  
  // Update left label
  document.querySelector('.score-stat.remain .lbl').textContent = isShuffled ? 'Left (Shuffled)' : 'Left';
  
  if (answered === total && total > 0) {
    setTimeout(showResult, 500);
  }
}

function showResult() {
  const total = currentQuestions.length;
  const pct = Math.round((correct / total) * 100);
  const banner = document.getElementById('result-banner');
  document.getElementById('final-score').textContent = pct + '%';
  let grade, msg;
  if (pct >= 90) { grade = 'A+ — ممتاز 🏆'; msg = 'أتقنت كل أرقام المنهج! مستوى احترافي.'; }
  else if (pct >= 80) { grade = 'A — جيد جدًا'; msg = 'أداء رائع! راجع الأسئلة الغلط مرة تانية.'; }
  else if (pct >= 70) { grade = 'B — جيد'; msg = 'كويس! في أرقام محتاج تراجعها أكتر.'; }
  else if (pct >= 60) { grade = 'C — مقبول'; msg = 'خد وقتك وراجع كل section بالتفصيل.'; }
  else { grade = 'يلا تاني 💪'; msg = 'مفيش مشكلة — الأرقام محتاجة تكرار. Retry!'; }
  document.getElementById('final-grade').textContent = grade;
  document.getElementById('final-msg').textContent = msg;
  banner.classList.add('show');
  banner.scrollIntoView({ behavior: 'smooth' });
}

function buildQuiz() {
  const container = document.getElementById('q-container');
  container.innerHTML = '';
  const letters = ['A','B','C','D'];
  let lastSection = '';

  currentQuestions.forEach((q, qi) => {
    if (!isShuffled && q.section !== lastSection) {
      lastSection = q.section;
      const sh = document.createElement('div');
      sh.className = 'section-header';
      sh.innerHTML = q.section + '<span class="count">Q' + (qi+1) + '</span>';
      container.appendChild(sh);
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'q' + qi;

    const head = document.createElement('div');
    head.className = 'q-head';
    head.innerHTML = `<span class="q-num">Q${qi+1}</span><span class="q-text">${q.q}</span>`;
    card.appendChild(head);

    const optsDiv = document.createElement('div');
    optsDiv.className = 'q-options';

    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span class="opt-letter">${letters[oi]}</span>${opt}`;
      btn.onclick = () => handleAnswer(qi, oi, q.ans, optsDiv, expDiv);
      optsDiv.appendChild(btn);
    });

    card.appendChild(optsDiv);

    const expDiv = document.createElement('div');
    expDiv.className = 'explanation';
    expDiv.textContent = '💡 ' + q.exp;
    card.appendChild(expDiv);

    container.appendChild(card);
  });
}

function handleAnswer(qi, chosen, correct_idx, optsDiv, expDiv) {
  const btns = optsDiv.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  if (chosen === correct_idx) {
    btns[chosen].classList.add('correct');
    correct++;
  } else {
    btns[chosen].classList.add('incorrect');
    btns[correct_idx].classList.add('reveal-correct');
    wrong++;
  }

  expDiv.classList.add('show');
  answered++;
  updateStats();
}

buildQuiz();
updateStats();

</script>
</body>
</html>
