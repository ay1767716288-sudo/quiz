<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FMI Quizzes</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --u4: #185FA5;
      --u4-light: #E6F1FB;
      --u4-dark: #042C53;
      --u5: #1D9E75;
      --u5-light: #E1F5EE;
      --u5-dark: #04342C;
      --bg: #0d0f12;
      --card-bg: #161a20;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f0;
      --muted: rgba(240,240,240,0.45);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
      position: relative;
    }

    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
    }

    .title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.6s 0.1s ease forwards;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 3rem;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s ease forwards;
    }

    .cards {
      display: flex;
      gap: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.35s ease forwards;
    }

    .card {
      position: relative;
      width: 240px;
      height: 290px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      transition: transform 0.25s cubic-bezier(.22,.68,0,1.2), border-color 0.25s, box-shadow 0.25s;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 20px;
    }

    .card-u4::before { background: radial-gradient(circle at 50% 0%, rgba(24,95,165,0.25) 0%, transparent 65%); }
    .card-u5::before { background: radial-gradient(circle at 50% 0%, rgba(29,158,117,0.25) 0%, transparent 65%); }

    .card:hover::before { opacity: 1; }
    .card:hover { transform: translateY(-6px) scale(1.02); }
    .card-u4:hover { border-color: rgba(24,95,165,0.6); box-shadow: 0 20px 50px rgba(24,95,165,0.2); }
    .card-u5:hover { border-color: rgba(29,158,117,0.6); box-shadow: 0 20px 50px rgba(29,158,117,0.2); }

    .card:active { transform: translateY(-2px) scale(0.99); }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      position: relative;
      z-index: 1;
    }

    .card-u4 .card-icon { background: rgba(24,95,165,0.18); color: #85B7EB; border: 1px solid rgba(24,95,165,0.3); }
    .card-u5 .card-icon { background: rgba(29,158,117,0.18); color: #5DCAA5; border: 1px solid rgba(29,158,117,0.3); }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      padding: 0 1.25rem;
      position: relative;
      z-index: 1;
    }

    .card-arrow {
      position: absolute;
      bottom: 1.25rem;
      right: 1.25rem;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: transform 0.2s;
    }

    .card-u4 .card-arrow { background: rgba(24,95,165,0.15); color: #85B7EB; }
    .card-u5 .card-arrow { background: rgba(29,158,117,0.15); color: #5DCAA5; }
    .card:hover .card-arrow { transform: translate(2px, -2px); }

    .card-num {
      position: absolute;
      top: 1rem;
      left: 1.25rem;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      opacity: 0.3;
      font-family: 'Syne', sans-serif;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .cards { flex-direction: column; gap: 1rem; }
      .card { width: 280px; height: 220px; flex-direction: row; justify-content: flex-start; padding: 1.25rem; gap: 1rem; }
      .card-icon { width: 52px; height: 52px; flex-shrink: 0; font-size: 18px; }
      .card-title { font-size: 17px; text-align: left; }
      .card-desc { display: none; }
      .card-arrow { bottom: 1rem; }
      .card-num { top: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="label">FMI — English for Business</p>
    <h1 class="title">Choose Your Quiz</h1>
    <p class="subtitle">Select a unit to start practicing</p>

    <div class="cards">

      <a class="card card-u4" href="unit_4.html">
        <span class="card-num">01</span>
        <div class="card-icon">U4</div>
        <div class="card-title">Unit 4 Quiz</div>
        <div class="card-desc">Subject/Verb Agreement · Financial Idioms · Marketing & Mind Control · Terms</div>
        <div class="card-arrow">↗</div>
      </a>

      <a class="card card-u5" href="unit_5.html">
        <span class="card-num">02</span>
        <div class="card-icon">U5</div>
        <div class="card-title">Unit 5 Quiz</div>
        <div class="card-desc">Parallel Structure · Financial Idioms · Reading Comprehension · Terms</div>
        <div class="card-arrow">↗</div>
      </a>

    </div>
  </div>
</body>
</html>
